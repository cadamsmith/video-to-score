# Run `uv run pre-commit install` once to enable. Mirrors the lint steps in
# .github/workflows/ci.yml. Hooks call `uv run ruff` so the ruff version is the
# one pinned in pyproject.toml -- no second place to keep in sync.
repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check --fix
        language: system
        types_or: [python, pyi]
        require_serial: true
      - id: ruff-format
        name: ruff format
        entry: uv run ruff format
        language: system
        types_or: [python, pyi]
        require_serial: true
